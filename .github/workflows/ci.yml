name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ===== シークレット漏洩スキャン =====
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz"
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact

  # ===== バックエンド =====
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: closet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: |
          cd backend
          uv sync --dev
      - name: Lint (ruff)
        run: cd backend && uv run ruff check .
      - name: Format check (ruff)
        run: cd backend && uv run ruff format --check .
      - name: Type check (mypy)
        run: cd backend && uv run mypy app
        continue-on-error: true
      - name: Run tests (pytest)
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/closet_test
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_API_KEY: test_dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
        run: cd backend && uv run pytest -v --tb=short
      - name: Dependency vulnerability check
        run: cd backend && uv run pip-audit
        continue-on-error: true

  # ===== フロントエンド =====
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint (ESLint)
        run: cd frontend && npm run lint
      - name: Type check (tsc)
        run: cd frontend && npm run type-check
        continue-on-error: true
      - name: Build check
        run: cd frontend && npm run build
      - name: Dependency vulnerability check
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

  # ===== API コントラクト検証 =====
  api-contract:
    name: API Contract Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: closet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: |
          cd backend
          uv sync --dev
      - name: Validate OpenAPI spec (docs/openapi.yaml)
        run: |
          cd backend
          uv run python -c "from openapi_spec_validator import validate; from openapi_spec_validator.readers import read_from_filename; spec, _ = read_from_filename('../docs/openapi.yaml'); validate(spec); print('docs/openapi.yaml is a valid OpenAPI document.')"
      - name: Check for undocumented endpoints (spec drift)
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/closet_test
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_API_KEY: test_dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
        run: cd backend && uv run python scripts/check_api_contract.py
      - name: Validate branch name convention
        if: github.event_name == 'pull_request'
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN='^(feat|feature|fix|refactor|test|docs|chore|infra)/(fe|be|db|llm|ci|docs)-[a-z0-9][a-z0-9-]*$'
          if echo "$BRANCH" | grep -qE "$PATTERN"; then
            echo "Branch name '$BRANCH' follows convention."
          else
            echo "ERROR: Branch '$BRANCH' does not match <type>/<scope>-<description>"
            echo "Valid types: feat feature fix refactor test docs chore infra"
            echo "Valid scopes: fe be db llm ci docs"
            exit 1
          fi

  # ===== Docker ビルド確認 =====
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t closet-backend ./backend
      - name: Build frontend image
        run: docker build -t closet-frontend ./frontend
