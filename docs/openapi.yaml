openapi: 3.0.3
info:
  title: クローゼット管理アプリ API
  version: 1.1.0
  description: |
    クローゼット管理アプリのバックエンドAPI仕様。
    - LLM: OpenAI（プロバイダ抽象化レイヤ経由。将来 Gemini / Claude へ切替可能）
    - 天気: Open-Meteo
    - 決済: Stripe Checkout / Webhook
    - 認証・DB・Storage: Supabase

tags:
  - name: Auth
    description: 認証・ユーザープロフィール関連
  - name: Region
    description: 地域マスタ関連（主にオンボーディング・天気連携用）
  - name: Clothes
    description: 服アイテム管理・画像アップロード・画像解析
  - name: Outfit
    description: コーデ提案・履歴管理
  - name: Weather
    description: 天気予報取得
  - name: Billing
    description: Stripe課金・Webhook処理

servers:
  - url: http://localhost:8000
    description: ローカル開発
  - url: https://api.example.com
    description: 本番（努力目標）

security:
  - BearerAuth: []

# ================================================================
# 共通レスポンス定義
# ================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Authが発行するJWT

  responses:
    Unauthorized:
      description: 未認証（JWTが無効・期限切れ）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "認証が必要です"
            code: "unauthorized"
    Forbidden:
      description: 認可エラー（他ユーザーのリソースへのアクセス）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "アクセス権限がありません"
            code: "forbidden"
    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "リソースが見つかりません"
            code: "not_found"
    BadRequest:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: レート制限超過
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "リクエスト回数の上限に達しました。しばらく待ってから再試行してください"
            code: "rate_limit_exceeded"

  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: エラー内容
        code:
          type: string
          nullable: true
          description: アプリケーション側のエラーコード

    # ===== Auth =====
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        default_region_code:
          type: string
          example: "13_01"
          description: |
            ユーザーのデフォルト地域コード（{都道府県コード}_{連番} 形式）。
            オンボーディング時に必須設定。コーデ提案や天気取得で region_code が
            省略された場合のフォールバックとして使用される。
          nullable: true
        secondary_region_code:
          type: string
          example: "13_02"
          description: |
            ユーザーの副地域コード（{都道府県コード}_{連番} 形式）。
            勤務先・旅行先など「第2の地点」として任意で保存する。
            利用する場合はリクエストの region_code で明示する。
          nullable: true
        subscription_status:
          type: string
          enum: [free, active, canceled]
          description: |
            現在の課金状態。
            - free: 無料プラン（デフォルト）
            - active: 有料プラン契約中
            - canceled: 解約済み（期間終了まで active 扱い）
        stripe_customer_id:
          type: string
          nullable: true
          description: Stripe Customer ID（課金ユーザーのみ設定）
        created_at:
          type: string
          format: date-time

    # ===== 地域マスタ =====
    Region:
      type: object
      properties:
        code:
          type: string
          example: "13_01"
          description: |
            地域コード（{都道府県コード}_{連番}）。
            都道府県コードは JIS X 0401 準拠。
        prefecture_code:
          type: string
          example: "13"
          description: JIS X 0401 都道府県コード（2桁）
        prefecture_name:
          type: string
          example: 東京都
        name:
          type: string
          example: 23区
          description: 地域の通称（県内の細分化された地域名）
        city:
          type: string
          example: 新宿区
          description: 代表地点の市町村名
        latitude:
          type: number
          format: float
          example: 35.6895
          description: 代表地点の緯度（Open-Meteo に渡す値）
        longitude:
          type: number
          format: float
          example: 139.6917
          description: 代表地点の経度

    RegionsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Region"

    ReplaceUserProfileRequest:
      type: object
      required: [display_name, default_region_code, secondary_region_code]
      properties:
        display_name:
          type: string
          nullable: true
          description: 表示名。未設定に戻す場合は null を送る。
        default_region_code:
          type: string
          nullable: true
          example: "13_01"
          description: 主に利用する地域コード。未設定に戻す場合は null を送る。
        secondary_region_code:
          type: string
          nullable: true
          example: "13_02"
          description: 副地域コード。未設定に戻す場合は null を送る。

    PatchUserProfileRequest:
      type: object
      description: 送信したフィールドのみ更新する。
      properties:
        display_name:
          type: string
          nullable: true
          description: 表示名。null を送ると未設定に戻す。
        default_region_code:
          type: string
          nullable: true
          example: "13_01"
          description: 主に利用する地域コード。null を送ると未設定に戻す。
        secondary_region_code:
          type: string
          nullable: true
          example: "13_02"
          description: 副地域コード。null を送ると未設定に戻す。

    # ===== 服 =====
    # カテゴリ・パターン・季節 は複数箇所で使うため enum を定義
    ClothingCategory:
      type: string
      enum: [tops, bottoms, outer, onepiece, shoes, bag, accessory]
      description: |
        服のカテゴリ。
        - tops: トップス
        - bottoms: ボトムス
        - outer: アウター
        - onepiece: ワンピース
        - shoes: 靴
        - bag: バッグ
        - accessory: アクセサリー

    ClothingPattern:
      type: string
      enum: [solid, stripe, check, dot, floral, other]
      description: |
        服の柄。
        - solid: 無地
        - stripe: ストライプ
        - check: チェック
        - dot: ドット
        - floral: 花柄
        - other: その他

    SeasonTag:
      type: string
      enum: [spring, summer, autumn, winter, all]

    TpoTag:
      type: string
      enum: [casual, formal, ceremony, leisure, business]

    ClothingItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          example: 白シャツ
        category:
          $ref: "#/components/schemas/ClothingCategory"
        color:
          type: string
          example: white
        pattern:
          allOf:
            - $ref: "#/components/schemas/ClothingPattern"
          nullable: true
        size:
          type: string
          example: M
          nullable: true
        season:
          type: array
          items:
            $ref: "#/components/schemas/SeasonTag"
        tpo_tags:
          type: array
          items:
            $ref: "#/components/schemas/TpoTag"
          description: このアイテムが適したTPOタグ（clothes_tpo テーブルに対応）
        image_url:
          type: string
          format: uri
          description: Supabase Storage の公開オブジェクトURL（/upload-url が返す値をそのまま保存・表示）
          nullable: true
        thumbnail_url:
          type: string
          format: uri
          nullable: true
        memo:
          type: string
          maxLength: 200
          nullable: true
        is_favorite:
          type: boolean
          default: false
        wear_count:
          type: integer
          default: 0
          description: 着用回数（MVPでは記録のみ、学習には未使用）
        last_worn_at:
          type: string
          format: date-time
          nullable: true
        attributes:
          type: object
          description: LLMが画像から抽出した追加属性（素材・スタイルなど）
          additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ClothingCreateRequest:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
          maxLength: 100
        category:
          $ref: "#/components/schemas/ClothingCategory"
        color:
          type: string
          nullable: true
        pattern:
          allOf:
            - $ref: "#/components/schemas/ClothingPattern"
          nullable: true
        size:
          type: string
          nullable: true
        season:
          type: array
          items:
            $ref: "#/components/schemas/SeasonTag"
        tpo_tags:
          type: array
          items:
            $ref: "#/components/schemas/TpoTag"
        image_url:
          type: string
          format: uri
          nullable: true
          description: /upload-url が返した公開オブジェクトURL（そのまま保存する）
        memo:
          type: string
          maxLength: 200
          nullable: true

    ClothingUpdateRequest:
      type: object
      description: 送信したフィールドのみ更新される（PATCH相当）
      properties:
        name:
          type: string
          maxLength: 100
        category:
          $ref: "#/components/schemas/ClothingCategory"
        color:
          type: string
        pattern:
          $ref: "#/components/schemas/ClothingPattern"
        size:
          type: string
        season:
          type: array
          items:
            $ref: "#/components/schemas/SeasonTag"
        tpo_tags:
          type: array
          items:
            $ref: "#/components/schemas/TpoTag"
        memo:
          type: string
          maxLength: 200
        is_favorite:
          type: boolean

    ClothesListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ClothingItem"
        total:
          type: integer
          description: フィルタ条件に合致する全件数（ページネーション用）

    UploadUrlResponse:
      type: object
      required: [upload_url, storage_path, image_url]
      properties:
        upload_url:
          type: string
          format: uri
          description: Supabase Storage の署名付きアップロードURL（フロントがこのURLに直接PUTする）
        storage_path:
          type: string
          description: アップロード後の画像パス（バケット内パス）
        image_url:
          type: string
          format: uri
          description: >-
            公開オブジェクトURL（BE が組み立て）。FE は PUT 後、この値をそのまま
            ClothingCreateRequest.image_url として保存・表示する（#133）。

    # ===== 画像解析（LLM） =====
    AnalyzeImageRequest:
      type: object
      required: [image_url]
      properties:
        image_url:
          type: string
          format: uri
          description: 解析対象の画像の公開オブジェクトURL（/upload-url が返す image_url）

    AnalyzeImageResponse:
      type: object
      description: |
        LLM（Gemini 2.5 Flash）が画像から推定した属性。
        フロントエンドの服登録フォームの初期値として使用し、ユーザーが確認・修正する。
      properties:
        name:
          type: string
          example: 白シャツ
          description: LLMが推定したアイテム名称
        category:
          $ref: "#/components/schemas/ClothingCategory"
        color:
          type: string
          example: white
        pattern:
          $ref: "#/components/schemas/ClothingPattern"
        season:
          type: array
          items:
            $ref: "#/components/schemas/SeasonTag"
        tpo_tags:
          type: array
          items:
            $ref: "#/components/schemas/TpoTag"
        attributes:
          type: object
          description: その他LLMが抽出した属性（素材など）
          additionalProperties: true
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: LLMの推定信頼度（0〜1）。低い場合はフロントで警告表示を推奨

    # ===== コーデ（Outfit）=====
    OutfitItem:
      type: object
      description: >-
        コーデを構成する1アイテム。手持ち（owned）／補完提案（suggested）が混在しうる。
        手持ちは clothing_item を解決、補完は clothing_item=null で name/color/pattern を返す。
      properties:
        name:
          type: string
          description: アイテム名（owned は DB 値、suggested は item_snapshot 由来）
        role:
          type: string
          description: >-
            このコーデ内でのアイテムの役割（tops / bottoms / outer / onepiece / shoes / bag / accessory）。
            提案上の役割であり clothing_item.category と必ずしも一致しない
        color:
          type: string
          nullable: true
        pattern:
          type: string
          nullable: true
        display_order:
          type: integer
          description: 表示順
        clothing_item:
          allOf:
            - $ref: "#/components/schemas/ClothingItem"
          nullable: true
          description: 手持ち服の詳細（owned のみ。suggested は null）

    Outfit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        tpo:
          $ref: "#/components/schemas/TpoTag"
        region_code:
          type: string
          example: "19_02"
          description: 提案時に使用した地域コード
        region:
          allOf:
            - $ref: "#/components/schemas/Region"
          nullable: true
          description: region_code から解決した地域情報（名称表示用）。未定義コードは null
        weather_summary:
          type: string
          description: 提案時の天気スナップショット
          nullable: true
        weather_temp_max:
          type: number
          nullable: true
        weather_temp_min:
          type: number
          nullable: true
        comment:
          type: string
          description: LLMのおすすめポイント（200字以内）
          nullable: true
        coordinate_image_url:
          type: string
          format: uri
          description: 生成または保存済みのコーデ画像URL
          nullable: true
        is_favorite:
          type: boolean
          default: false
        source:
          type: string
          enum: [llm, manual]
          description: llm = LLM提案, manual = ユーザーが手動で作成
        items:
          type: array
          items:
            $ref: "#/components/schemas/OutfitItem"
        created_at:
          type: string
          format: date-time

    OutfitsListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Outfit"
        total:
          type: integer

    OutfitUpdateRequest:
      type: object
      description: お気に入りトグルなど、提案済みコーデの属性更新
      required: [is_favorite]
      properties:
        is_favorite:
          type: boolean

    OutfitCreateItem:
      type: object
      description: 保存する 1 アイテム。手持ちは clothes_id を、補完提案は null を入れる
      required: [name, role, display_order]
      properties:
        name:
          type: string
        role:
          type: string
          description: tops / bottoms / outer / onepiece / shoes / bag / accessory
        color:
          type: string
          nullable: true
        pattern:
          type: string
          nullable: true
        display_order:
          type: integer
        clothes_id:
          type: string
          format: uuid
          nullable: true
          description: >-
            手持ち服の場合は clothing_item.id、補完提案は null。
            clothes_id がある場合は表示・snapshot ともサーバ側で DB 値を正とする
            （入力の name/color/pattern は補完提案=null時のみ採用）。

    OutfitCreateRequest:
      type: object
      description: >-
        提案コーデを履歴として保存する。FE は suggest レスポンスの item から
        clothes_id = clothing_item?.id ?? null を詰めて送る。
      required: [tpo, region_code, items]
      properties:
        tpo:
          $ref: "#/components/schemas/TpoTag"
        region_code:
          type: string
          example: "13_01"
        weather_summary:
          type: string
          maxLength: 255
          nullable: true
          description: 提案時の天気スナップショット。FE が suggest レスポンスから転送する
        weather_temp_max:
          type: number
          nullable: true
        weather_temp_min:
          type: number
          nullable: true
        comment:
          type: string
          nullable: true
        is_favorite:
          type: boolean
          default: false
        items:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/OutfitCreateItem"

    # ===== コーデ提案リクエスト／レスポンス =====
    CoordinateSuggestRequest:
      type: object
      required: [tpo]
      properties:
        tpo:
          $ref: "#/components/schemas/TpoTag"
        date:
          type: string
          format: date
          description: 着用日。現状は未使用（予報は常に現在＋当日を使用）。将来の指定日提案に向けた予約フィールド
        region_code:
          type: string
          example: "19_02"
          description: |
            提案で使用する地域コード。
            省略時はユーザーの default_region_code を使用。
            旅行先・帰省先など別地域での提案を受けたい場合に指定する。
        clothing_ids:
          type: array
          items:
            type: string
            format: uuid
          description: 提案で優先的に含めたい服のID（プロンプトで「優先して使う」と指示する best-effort。LLM が選定するため必ず含まれる保証ではない）
        exclude_clothing_ids:
          type: array
          items:
            type: string
            format: uuid
          description: 提案から除外する服のID（「別の提案」時に前回のアイテムを除外するなど）

    # LLM提案アイテム（POST /outfits/suggest 用）。
    # 手持ち服はそのまま clothing_item に解決し、手持ちにない補完アイテムは
    # clothing_item=null（name/role/color/pattern のみ）で返すハイブリッド形式。
    SuggestOutfitItem:
      type: object
      description: LLMが提案したコーデの1アイテム
      properties:
        name:
          type: string
          description: アイテム名（手持ち／補完提案いずれも入る）
        role:
          type: string
          description: >-
            このコーデ内でのアイテムの役割（tops / bottoms / outer / onepiece / shoes / bag / accessory）。
            提案上の役割であり clothing_item.category と必ずしも一致しない（同一視しないこと）
        color:
          type: string
          nullable: true
        pattern:
          type: string
          nullable: true
        display_order:
          type: integer
          description: 表示順
        clothing_item:
          allOf:
            - $ref: "#/components/schemas/ClothingItem"
          nullable: true
          description: 手持ち服に一致した場合の服詳細。手持ちにない補完提案の場合は null

    SuggestOutfit:
      type: object
      description: LLMが提案したコーデ（現状はDB保存せず、id/created_atは一時生成）
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        tpo:
          $ref: "#/components/schemas/TpoTag"
        region_code:
          type: string
          example: "13_01"
          description: 提案に使用した地域コード
        comment:
          type: string
          description: LLMのおすすめポイント
          nullable: true
        is_favorite:
          type: boolean
          default: false
          description: 現状の suggest レスポンスでは未保存のため常に false（型整合のため保持）
        items:
          type: array
          items:
            $ref: "#/components/schemas/SuggestOutfitItem"
        created_at:
          type: string
          format: date-time

    CoordinateSuggestResponse:
      type: object
      description: |
        コーデ提案レスポンス。クローゼットを参照し LLM がコーデを生成する。
        outfits に加え、提案に使用した地域情報（region_used）と当日の天気要約を返し、
        画面での地域名・天気表示に用いる。FE は保存時に weather を OutfitCreateRequest へ転送する。
      properties:
        outfits:
          type: array
          items:
            $ref: "#/components/schemas/SuggestOutfit"
          description: 提案されたコーデ
        region_used:
          allOf:
            - $ref: "#/components/schemas/Region"
          nullable: true
          description: 提案に使用した地域情報（名称表示用）。未定義コードは null
        weather_summary:
          type: string
          nullable: true
          description: 提案時の当日天気要約（例「晴れ」）
        weather_temp_max:
          type: number
          nullable: true
        weather_temp_min:
          type: number
          nullable: true

    # ===== 天気 =====
    WeatherForecast:
      type: object
      properties:
        region_code:
          type: string
          description: 取得した地域コード
        current:
          type: object
          properties:
            temperature_2m:
              type: number
              description: 現在気温（℃）
            weather_code:
              type: integer
              description: WMO天気コード
            precipitation_probability:
              type: integer
              description: 降水確率（%）
        daily:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              temperature_max:
                type: number
              temperature_min:
                type: number
              weather_code:
                type: integer
              precipitation_probability_max:
                type: integer
        cached:
          type: boolean

    CheckoutSessionResponse:
      type: object
      required: [checkout_url]
      properties:
        checkout_url:
          type: string
          format: uri
          description: Stripe Checkout へリダイレクトするURL

    PortalSessionResponse:
      type: object
      required: [portal_url]
      properties:
        portal_url:
          type: string
          format: uri
          description: Stripe Customer Portal へリダイレクトするURL

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: ログイン
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: 自分のユーザー情報を取得
      description: プラン状態・デフォルト地域を含むプロフィール情報を返す
      responses:
        "200":
          description: ユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags: [Auth]
      operationId: replaceCurrentUserProfile
      summary: 自分のプロフィール情報を置き換え
      description: |
        自分のプロフィール情報を全項目置き換える。
        display_name、default_region_code、secondary_region_code をまとめて更新する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceUserProfileRequest"
      responses:
        "200":
          description: 更新後のユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: 不正な region_code、または主地域と副地域の重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      tags: [Auth]
      operationId: patchCurrentUserProfile
      summary: 自分のプロフィール情報を部分更新
      description: |
        自分のプロフィール情報を部分更新する。
        送信したフィールドのみ変更され、未送信フィールドは保持される。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserProfileRequest"
      responses:
        "200":
          description: 更新後のユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: 不正な region_code、または主地域と副地域の重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ================================================================
  # 地域マスタ（認証不要）
  # ================================================================
  /api/v1/regions:
    get:
      tags: [Region]
      operationId: listRegions
      summary: 地域マスタ一覧
      description: |
        利用可能な地域の一覧を返す。
        都道府県（47件）→ 各都道府県内の細分化された地域（2〜5件程度）の2階層構造。
        フロントエンドの地域選択プルダウン構築に使用。
        マスタは backend/app/constants/regions.py に Python 定数として管理される。
      security: []
      parameters:
        - name: prefecture_code
          in: query
          description: |
            都道府県コードで絞り込み（JIS X 0401, 2桁）。
            省略時は全47都道府県の全地域を返す。
          required: false
          schema:
            type: string
            pattern: "^[0-9]{2}$"
            example: "19"
      responses:
        "200":
          description: 地域一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegionsResponse"

  # ================================================================
  # 服管理
  # ================================================================
  /api/v1/clothes:
    get:
      tags: [Clothes]
      operationId: listClothes
      summary: 服一覧取得
      description: ログインユーザーが登録した服の一覧を返す。フィルタ・ページネーション対応。
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/ClothingCategory"
        - name: season
          in: query
          schema:
            $ref: "#/components/schemas/SeasonTag"
        - name: tpo
          in: query
          schema:
            $ref: "#/components/schemas/TpoTag"
        - name: is_favorite
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 服一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClothesListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Clothes]
      operationId: createClothing
      summary: 服を登録
      description: |
        服のメタ情報を登録する。
        画像は事前に /api/v1/clothes/upload-url で発行した署名付きURLで
        Supabase Storage に直接アップロードし、同レスポンスの image_url（公開URL）を
        そのまま image_url として渡す（#133）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClothingCreateRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClothingItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/clothes/upload-url:
    post:
      tags: [Clothes]
      operationId: createClothingUploadUrl
      summary: 画像アップロード用署名付きURL発行
      description: |
        フロントエンドはこのURLに直接PUTリクエストで画像をアップロードする。
        アップロード後、同レスポンスの image_url（BE が組み立てた公開URL）を
        そのまま ClothingCreateRequest.image_url として渡す（#133）。
        バックエンドを画像転送のプロキシにしない設計。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, content_type]
              properties:
                filename:
                  type: string
                  example: shirt.jpg
                content_type:
                  type: string
                  enum: [image/jpeg, image/png, image/webp]
                  example: image/jpeg
      responses:
        "200":
          description: 署名付きアップロードURL・storage_path・公開image_url
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/clothes/analyze-image:
    post:
      tags: [Clothes]
      operationId: analyzeClothingImage
      summary: 画像からLLMで服の属性を推定
      description: |
        Supabase Storage にアップロード済みの服画像URLを受け取り、
        Gemini 2.5 Flash に渡してカテゴリ・色・柄・季節などを推定して返す。
        フロントエンドの服登録フォームの初期値として使用し、ユーザーが確認・修正する。

        プロンプトインジェクション対策：
        - 画像内の文字指示はシステムプロンプトで無視するよう指定
        - 出力は responseSchema で固定済み（構造化出力）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeImageRequest"
      responses:
        "200":
          description: LLMによる属性推定結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeImageResponse"
        "400":
          description: 無効な画像URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/clothes/{clothes_id}:
    parameters:
      - name: clothes_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Clothes]
      operationId: getClothingById
      summary: 服の詳細取得
      responses:
        "200":
          description: 服の詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClothingItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Clothes]
      operationId: replaceClothingById
      summary: 服情報の更新（全フィールド置換）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClothingUpdateRequest"
      responses:
        "200":
          description: 更新後の服情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClothingItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Clothes]
      operationId: updateClothingById
      summary: 服情報の部分更新
      description: 送信したフィールドのみ更新する（is_favorite トグルなど）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClothingUpdateRequest"
      responses:
        "200":
          description: 更新後の服情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClothingItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Clothes]
      operationId: deleteClothingById
      summary: 服を削除
      description: >-
        服を削除する。関連する outfit_items は clothes_id を SET NULL にする
        （保存済みコーデは履歴として残り、item_snapshot から表示を継続）。
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ================================================================
  # コーデ（提案・履歴）
  # ================================================================
  /api/v1/outfits/suggest:
    post:
      tags: [Outfit]
      operationId: suggestOutfits
      summary: LLMによるコーデ提案
      description: |
        登録済みの服（クローゼット） × TPO × 天気情報を LLM に渡してコーデを提案する。
        手持ち服を優先し、手持ちで埋まらないカテゴリは LLM が補完アイテムを提案する
        （ハイブリッド）。手持ちに一致したアイテムは clothing_item に解決して返す。

        suggest 自体は非保存（テキスト提案）。履歴化はユーザーが選んだコーデのみ
        別途 POST /outfits（オンデマンド保存）で行う。提案結果キャッシュは後続対応。
        天気キャッシュ（Redis 30分）は提案入力として利用する。

        レート制限: 1ユーザー1分10回 / 1日の上限はプランによる
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoordinateSuggestRequest"
      responses:
        "200":
          description: コーデ提案結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoordinateSuggestResponse"
        "400":
          description: 不正な region_code、またはユーザーの default_region_code 未設定
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/outfits:
    post:
      tags: [Outfit]
      operationId: createOutfit
      summary: 提案コーデの保存（履歴化）
      description: >-
        ユーザーが選んだ提案コーデを履歴として保存する。clothes_id 付きアイテムは
        所有を検証して owned 保存、それ以外は item_snapshot を伴う suggested 保存。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutfitCreateRequest"
      responses:
        "201":
          description: 保存されたコーデ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outfit"
        "400":
          description: 不正な region_code、または所有外の clothes_id を含む
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      tags: [Outfit]
      operationId: listOutfits
      summary: 提案コーデ履歴一覧
      description: ログインユーザーの過去の提案コーデ一覧を返す。
      parameters:
        - name: is_favorite
          in: query
          schema:
            type: boolean
          description: true の場合、お気に入りのみ返す
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: コーデ一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutfitsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/outfits/{outfit_id}:
    parameters:
      - name: outfit_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Outfit]
      operationId: getOutfitById
      summary: コーデ詳細取得
      responses:
        "200":
          description: コーデ詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outfit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Outfit]
      operationId: updateOutfitById
      summary: コーデの属性更新（お気に入りトグルなど）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutfitUpdateRequest"
      responses:
        "200":
          description: 更新後のコーデ情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outfit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ================================================================
  # 天気
  # ================================================================
  /api/v1/weather/forecast:
    get:
      tags: [Weather]
      operationId: getWeatherForecast
      summary: 天気予報取得（Open-Meteo）
      description: |
        指定された地域コードの代表地点の緯度経度で Open-Meteo から天気予報を取得する。
        Redisに30分キャッシュ済みの場合はそちらを返す（キャッシュキー: weather:{region_code}:{yyyymmdd}:{days}）。
        地域コードは /api/v1/regions で取得可能。
      parameters:
        - name: region_code
          in: query
          required: true
          schema:
            type: string
            example: "19_02"
          description: 地域コード（{都道府県コード}_{連番}）
        - name: days
          in: query
          schema:
            type: integer
            default: 3
            maximum: 7
      responses:
        "200":
          description: 天気予報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherForecast"
        "400":
          description: 不正な region_code（マスタに存在しない）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ================================================================
  # 決済（Stripe）
  # ================================================================
  /api/v1/billing/checkout:
    post:
      tags: [Billing]
      operationId: createBillingCheckoutSession
      summary: Stripe Checkout セッション作成
      description: |
        月額サブスクリプションの決済セッションを作成する。
        フロントはこのURLにリダイレクトするだけで決済画面が表示される。
        テストカード: 4242 4242 4242 4242
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price_id]
              properties:
                price_id:
                  type: string
                  description: Stripeの月額プランのprice ID
                  example: price_xxx
                success_url:
                  type: string
                  format: uri
                  description: 決済成功後のリダイレクト先
                cancel_url:
                  type: string
                  format: uri
                  description: 決済キャンセル後のリダイレクト先
      responses:
        "200":
          description: Checkoutセッション作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/billing/portal:
    get:
      tags: [Billing]
      operationId: createBillingPortalSession
      summary: Stripe Customer Portal セッション取得
      description: |
        解約・支払い方法変更はPortalにリダイレクトするだけでStripe側が処理する。
        有料プランのユーザーのみ利用可能。
      parameters:
        - name: return_url
          in: query
          schema:
            type: string
            format: uri
          description: Portal終了後のリダイレクト先
      responses:
        "200":
          description: Portalセッション作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 有料プランでないユーザーはアクセス不可
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/billing/webhook:
    post:
      tags: [Billing]
      operationId: handleStripeWebhook
      summary: Stripe Webhook 受信
      description: |
        Stripeからの課金状態変化通知を受け取る。
        `Stripe-Signature` ヘッダーで署名検証（STRIPE_WEBHOOK_SECRET使用）。
        ローカル開発は `stripe listen --forward-to localhost:8000/api/v1/billing/webhook` で転送。

        処理するイベント:
        - checkout.session.completed → subscription_status を active に更新、stripe_customer_id を保存
        - customer.subscription.deleted → subscription_status を canceled に更新
        - customer.subscription.updated → status 変化（past_due 等）を subscriptions テーブルに同期
      security: []
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Stripe Webhookイベントペイロード（Stripe仕様に準拠）
      responses:
        "200":
          description: 受信・処理成功
        "400":
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
